    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .config-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .config-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .form-group input {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 14px;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .tokens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .token-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
            cursor: pointer;
        }

        .token-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .token-card.breakout {
            border: 2px solid #ef4444;
            background: rgba(239, 68, 68, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(239, 68, 68, 0);
            }
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .token-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .token-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .token-details {
            display: flex;
            flex-direction: column;
        }

        .token-name {
            font-size: 20px;
            font-weight: bold;
        }

        .token-symbol {
            font-size: 16px;
            opacity: 0.8;
        }

        .price-display {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
            color: #10b981;
        }

        .price-display.breakout-price {
            color: #ef4444;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .metric {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 11px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #10b981;
            transition: width 0.3s;
        }

        .alert-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 400px;
        }

        .alert {
            background: rgba(239, 68, 68, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .logs {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-time {
            color: #10b981;
            margin-right: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Surveillance Multi-Tokens Solana</h1>
            <p>GeckoTerminal API - 100% Gratuit</p>
            <div class="status">
                <div class="status-item">
                    <strong>Statut:</strong> <span id="status">Arrêté</span>
                </div>
                <div class="status-item">
                    <strong>Checks:</strong> <span id="check-count">0</span>
                </div>
                <div class="status-item">
                    <strong>Prochaine vérification:</strong> <span id="next-check">--</span>
                </div>
                <div class="status-item">
                    <strong>Alertes envoyées:</strong> <span id="alert-count">0</span>
                </div>
            </div>
        </div>

        <div class="config-panel">
            <h2>⚙️ Configuration Telegram</h2>
            <div class="config-form">
                <div class="form-group">
                    <label>Bot Token</label>
                    <input type="password" id="telegram-token" placeholder="1234567890:ABCdefGHIjklMNOpqrsTUVwxyz">
                </div>
                <div class="form-group">
                    <label>Chat ID</label>
                    <input type="text" id="telegram-chat-id" placeholder="123456789">
                </div>
                <div class="form-group">
                    <label>Fréquence de vérification (secondes)</label>
                    <input type="number" id="check-frequency" value="5" min="5">
                </div>
            </div>
            <button class="btn btn-primary" id="start-btn" onclick="startMonitoring()">
                ▶️ Démarrer la surveillance
            </button>
            <button class="btn btn-danger" id="stop-btn" onclick="stopMonitoring()" style="display: none;">
                ⏸️ Arrêter
            </button>
        </div>

        <div id="tokens-container" class="tokens-grid">
            <div class="loading">Configurez vos paramètres Telegram et démarrez la surveillance...</div>
        </div>

        <div class="logs" id="logs">
            <div class="log-entry">
                <span class="log-time">[--:--:--]</span> En attente du démarrage...
            </div>
        </div>
    </div>

    <div class="alert-container" id="alert-container"></div>

    <script>
        // Configuration
        const TOKENS = [
            {
                name: "67",
                symbol: "$67",
                address: "9AvytnUKsLxPxFHFqS6VLxaxt5p6BhYNr53SD2Chpump",
                pool: "DMAFL613XTipuA3jFNYczavWT7XsiYf9cR3qmRMZQhB6",
                candle_interval: 15
            },
            {
                name: "PIPPIN",
                symbol: "$PIPPIN",
                address: "Dfh5DzRgSvvCFDoYc2ciTkMrbDfRKybA4SoFbPmApump",
                pool: "8WwcNqdZjCY5Pt7AkhupAFknV2txca9sq6YBkGzLbvdt",
                candle_interval: 15
            },
            {
                name: "UMBRA",
                symbol: "$UMBRA",
                address: "PRVT6TB7uss3FrUd2D9xs2zqDBsa3GbMJMwCQsgmeta",
                pool: "7dVri3qjYD3uobSZL3Zth8vSCgU6r6R2nvFsh7uVfDte",
                candle_interval: 15
            },
            {
                name: "WOJAK",
                symbol: "$WOJAK",
                address: "8J69rbLTzWWgUJziFY8jeu5tDwEPBwUz4pKBMr5rpump",
                pool: "FDrY5i5kuadZ1ik8gPS26qjj9Rw9mpufXMegGC2HNSP7",
                candle_interval: 15
            },
            {
                name: "AVICI",
                symbol: "$AVICI",
                address: "BANKJmvhT8tiJRsBSS1n2HryMBPvT5Ze4HU95DUAmeta",
                pool: "J7z6TZgWecZughSLJ41FsttUBTjH5oX3CQ5ZmD182BpD",
                candle_interval: 15
            },
            {
                name: "SPSC",
                symbol: "$SPSC",
                address: "4nswj3o1Lo9iWYvvRJxUD8vbCy9ay7QQoXYcncHNbonk",
                pool: "GcbZqAaWWmCse1Q68sfd5Sh32ZuHWPugq1NYowQuc5k1",
                candle_interval: 15
            }
        ];

        const BOLLINGER_PERIOD = 20;
        const BOLLINGER_STD = 2;
        const ALERT_COOLDOWN = 900000; // 15 minutes en millisecondes

        // État
        let isMonitoring = false;
        let checkInterval = null;
        let checkCount = 0;
        let alertCount = 0;
        let lastAlertTimes = {};
        let telegramToken = '';
        let telegramChatId = '';
        let checkFrequency = 30;

        // Charger la configuration depuis localStorage
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('telegram_token');
            const savedChatId = localStorage.getItem('telegram_chat_id');
            const savedFrequency = localStorage.getItem('check_frequency');
            
            if (savedToken) document.getElementById('telegram-token').value = savedToken;
            if (savedChatId) document.getElementById('telegram-chat-id').value = savedChatId;
            if (savedFrequency) document.getElementById('check-frequency').value = savedFrequency;
        });

        // Fonctions utilitaires
        function formatPrice(price) {
            if (!price) return 'N/A';
            if (price < 0.000001) return `$${price.toFixed(10)}`;
            if (price < 0.01) return `$${price.toFixed(8)}`;
            if (price < 1) return `$${price.toFixed(6)}`;
            return `$${price.toFixed(2)}`;
        }

        function formatTime(date) {
            return date.toLocaleTimeString('fr-FR');
        }

        function addLog(message) {
            const logsContainer = document.getElementById('logs');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `<span class="log-time">[${formatTime(new Date())}]</span> ${message}`;
            logsContainer.insertBefore(logEntry, logsContainer.firstChild);
            
            // Limiter à 50 logs
            while (logsContainer.children.length > 50) {
                logsContainer.removeChild(logsContainer.lastChild);
            }
        }

        // API Functions
        async function getGeckoTerminalOHLCV(poolAddress, aggregate = 15, limit = 25) {
            try {
                const url = `https://api.geckoterminal.com/api/v2/networks/solana/pools/${poolAddress}/ohlcv/minute`;
                const params = new URLSearchParams({
                    aggregate: aggregate,
                    limit: limit,
                    currency: 'usd'
                });

                const response = await fetch(`${url}?${params}`, {
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data?.data?.attributes?.ohlcv_list) {
                    return data.data.attributes.ohlcv_list.map(candle => ({
                        timestamp: candle[0],
                        open: parseFloat(candle[1]),
                        high: parseFloat(candle[2]),
                        low: parseFloat(candle[3]),
                        close: parseFloat(candle[4]),
                        volume: parseFloat(candle[5])
                    }));
                }
                
                return null;
            } catch (error) {
                console.error('Erreur GeckoTerminal OHLCV:', error);
                return null;
            }
        }

        async function getGeckoTerminalRealtimePrice(poolAddress) {
            try {
                const url = `https://api.geckoterminal.com/api/v2/networks/solana/pools/${poolAddress}?include=base_token`;
                const response = await fetch(url, {
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                const price = data?.data?.attributes?.base_token_price_usd ? parseFloat(data.data.attributes.base_token_price_usd) : null;
                const imageUrl = data?.included?.[0]?.attributes?.image_url || data?.data?.attributes?.image_url || null;
                
                return { price, imageUrl };
            } catch (error) {
                console.error('Erreur prix temps réel:', error);
                return { price: null, imageUrl: null };
            }
        }

        async function sendTelegramMessage(message) {
            if (!telegramToken || !telegramChatId) {
                console.warn('Configuration Telegram manquante');
                return false;
            }

            try {
                const url = `https://api.telegram.org/bot${telegramToken}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: telegramChatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                return response.ok;
            } catch (error) {
                console.error('Erreur Telegram:', error);
                return false;
            }
        }

        // Calculs
        function calculateBollingerBands(prices, period = 20, stdDev = 2) {
            if (prices.length < period) return { upper: null, middle: null, lower: null };

            const slice = prices.slice(-period);
            const mean = slice.reduce((a, b) => a + b, 0) / period;
            const variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / period;
            const std = Math.sqrt(variance);

            return {
                upper: mean + (stdDev * std),
                middle: mean,
                lower: mean - (stdDev * std)
            };
        }

        // UI
        function updateStatus(status) {
            document.getElementById('status').textContent = status;
        }

        function updateNextCheckTime(seconds) {
            const nextCheck = new Date(Date.now() + seconds * 1000);
            document.getElementById('next-check').textContent = formatTime(nextCheck);
        }

        function showAlert(token, info) {
            const alertContainer = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = 'alert';
            alert.innerHTML = `
                <div class="alert-title">🚨 BREAKOUT: ${token.symbol}</div>
                <div>Prix: ${formatPrice(info.current_price)}</div>
                <div>Bande haute: ${formatPrice(info.upper_band)}</div>
                <div>Déviation: +${info.deviation.toFixed(2)}%</div>
            `;
            alertContainer.appendChild(alert);

            // Supprimer après 10 secondes
            setTimeout(() => alert.remove(), 10000);

            // Notification navigateur
            if (Notification.permission === 'granted') {
                new Notification(`🚨 Breakout ${token.symbol}`, {
                    body: `Prix: ${formatPrice(info.current_price)} (+${info.deviation.toFixed(2)}%)`,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="75" font-size="75">🚨</text></svg>'
                });
            }
        }

        function renderTokenCards() {
            const container = document.getElementById('tokens-container');
            container.innerHTML = '';

            TOKENS.forEach(token => {
                const card = document.createElement('div');
                card.className = 'token-card';
                card.id = `token-${token.name}`;
                card.onclick = () => window.open(`https://gmgn.ai/sol/token/${token.address}`, '_blank');
                card.innerHTML = `
                    <div class="token-header">
                        <div class="token-info">
                            <img class="token-icon" id="icon-${token.name}" src="https://api.dicebear.com/7.x/shapes/svg?seed=${token.symbol}" alt="${token.symbol}">
                            <div class="token-details">
                                <div class="token-name">${token.name}</div>
                                <div class="token-symbol">${token.symbol}</div>
                            </div>
                        </div>
                    </div>
                    <div class="price-display" id="price-${token.name}">--</div>
                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-label">Bande haute</div>
                            <div class="metric-value" id="upper-${token.name}">--</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Moyenne</div>
                            <div class="metric-value" id="middle-${token.name}">--</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Distance</div>
                            <div class="metric-value" id="distance-${token.name}">--</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Volume</div>
                            <div class="metric-value" id="volume-${token.name}">--</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-${token.name}" style="width: 0%"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateTokenCard(token, info, isBreakout) {
            const card = document.getElementById(`token-${token.name}`);
            const priceEl = document.getElementById(`price-${token.name}`);
            const upperEl = document.getElementById(`upper-${token.name}`);
            const middleEl = document.getElementById(`middle-${token.name}`);
            const distanceEl = document.getElementById(`distance-${token.name}`);
            const volumeEl = document.getElementById(`volume-${token.name}`);
            const progressEl = document.getElementById(`progress-${token.name}`);

            priceEl.textContent = formatPrice(info.current_price);
            upperEl.textContent = formatPrice(info.upper_band);
            middleEl.textContent = formatPrice(info.middle_band);
            volumeEl.textContent = info.volume ? `$${info.volume.toLocaleString()}` : '--';

            if (info.upper_band && info.current_price) {
                const distance = ((info.upper_band - info.current_price) / info.current_price * 100);
                distanceEl.textContent = `${distance > 0 ? '+' : ''}${distance.toFixed(2)}%`;
                
                // Progress bar (100% = à la bande haute)
                const progress = Math.min(100, Math.max(0, 100 - (distance / 2) * 10));
                progressEl.style.width = `${progress}%`;
                
                if (progress > 90) {
                    progressEl.style.background = '#ef4444';
                } else if (progress > 70) {
                    progressEl.style.background = '#f59e0b';
                } else {
                    progressEl.style.background = '#10b981';
                }
            }

            if (isBreakout) {
                card.classList.add('breakout');
                priceEl.classList.add('breakout-price');
            } else {
                card.classList.remove('breakout');
                priceEl.classList.remove('breakout-price');
            }
        }

        // Monitoring
        async function checkToken(token) {
            try {
                const realtimeData = await getGeckoTerminalRealtimePrice(token.pool);
                const candles = await getGeckoTerminalOHLCV(token.pool, token.candle_interval, 25);

                if (!candles || candles.length < BOLLINGER_PERIOD) {
                    addLog(`❌ ${token.symbol}: Données insuffisantes (${candles ? candles.length : 0}/${BOLLINGER_PERIOD})`);
                    return;
                }

                // Mettre à jour l'icône si disponible
                if (realtimeData.imageUrl) {
                    const iconEl = document.getElementById(`icon-${token.name}`);
                    if (iconEl) {
                        iconEl.src = realtimeData.imageUrl;
                        iconEl.onerror = () => {
                            iconEl.src = `https://api.dicebear.com/7.x/shapes/svg?seed=${token.symbol}`;
                        };
                    }
                }

                const closePrices = candles.map(c => c.close);
                const currentPrice = realtimeData.price || closePrices[closePrices.length - 1];
                const bands = calculateBollingerBands(closePrices, BOLLINGER_PERIOD, BOLLINGER_STD);

                // Debug log pour PIPPIN
                if (token.symbol === '$PIPPIN') {
                    console.log('🔍 DEBUG PIPPIN CLASSIQUE:', {
                        nombreBougies: closePrices.length,
                        derniersPrix: closePrices.slice(-5),
                        prixActuel: currentPrice,
                        bandeHaute: bands.upper,
                        moyenne: bands.middle,
                        bandeBasse: bands.lower
                    });
                }

                const info = {
                    current_price: currentPrice,
                    upper_band: bands.upper,
                    middle_band: bands.middle,
                    lower_band: bands.lower,
                    volume: candles[candles.length - 1].volume
                };

                let isBreakout = false;

                if (bands.upper && currentPrice >= bands.upper) {
                    const lastAlert = lastAlertTimes[token.name] || 0;
                    const timeSinceLastAlert = Date.now() - lastAlert;

                    if (timeSinceLastAlert > ALERT_COOLDOWN) {
                        isBreakout = true;
                        lastAlertTimes[token.name] = Date.now();
                        alertCount++;
                        document.getElementById('alert-count').textContent = alertCount;

                        const deviation = ((currentPrice - bands.upper) / bands.upper) * 100;
                        info.deviation = deviation;

                        const message = `🚨 ALERTE BOLLINGER BREAKOUT! 🚨\n\n💰 Token: ${token.symbol}\n📈 Prix: ${formatPrice(currentPrice)}\n\n📊 Bandes Bollinger (${token.candle_interval}min):\n  • Bande haute: ${formatPrice(bands.upper)}\n  • Moyenne: ${formatPrice(bands.middle)}\n  • Bande basse: ${formatPrice(bands.lower)}\n\n🔥 Deviation: +${deviation.toFixed(2)}% au-dessus\n\n📊 Volume: $${info.volume.toLocaleString()}\n\n🔗 https://gmgn.ai/sol/token/${token.address}\n\n⏰ ${formatTime(new Date())}`;

                        await sendTelegramMessage(message);
                        showAlert(token, info);
                        addLog(`🚨 BREAKOUT ${token.symbol} - Alerte envoyée!`);
                    }
                }

                updateTokenCard(token, info, isBreakout);

                const distance = bands.upper ? ((bands.upper - currentPrice) / currentPrice * 100).toFixed(2) : 'N/A';
                addLog(`✅ ${token.symbol}: ${formatPrice(currentPrice)} | Distance: ${distance}%`);

            } catch (error) {
                console.error(`Erreur pour ${token.symbol}:`, error);
                addLog(`❌ ${token.symbol}: Erreur - ${error.message}`);
            }
        }

        async function performCheck() {
            checkCount++;
            document.getElementById('check-count').textContent = checkCount;
            addLog(`\n🔄 VÉRIFICATION #${checkCount}`);

            for (const token of TOKENS) {
                await checkToken(token);
            }

            updateNextCheckTime(checkFrequency);
        }

        function startMonitoring() {
            // Sauvegarder la configuration
            telegramToken = document.getElementById('telegram-token').value;
            telegramChatId = document.getElementById('telegram-chat-id').value;
            checkFrequency = parseInt(document.getElementById('check-frequency').value);

            if (!telegramToken || !telegramChatId) {
                alert('⚠️ Veuillez configurer votre Bot Token et Chat ID Telegram');
                return;
            }

            localStorage.setItem('telegram_token', telegramToken);
            localStorage.setItem('telegram_chat_id', telegramChatId);
            localStorage.setItem('check_frequency', checkFrequency);

            // Demander permission pour les notifications
            if (Notification.permission === 'default') {
                Notification.requestPermission();
            }

            isMonitoring = true;
            updateStatus('🟢 Actif');
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'inline-block';

            renderTokenCards();
            addLog('🚀 Surveillance démarrée!');

            // Première vérification immédiate
            performCheck();

            // Ensuite vérifications régulières
            checkInterval = setInterval(performCheck, checkFrequency * 1000);
        }

        function stopMonitoring() {
            isMonitoring = false;
            clearInterval(checkInterval);
            updateStatus('🔴 Arrêté');
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('stop-btn').style.display = 'none';
            addLog('⏸️ Surveillance arrêtée');
        }

        // Initialisation
        addLog('✅ Interface chargée - Prêt à démarrer');
    </script>
</body>
</html>
